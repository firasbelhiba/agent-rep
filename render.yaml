services:
  - type: web
    name: agent-rep-backend
    env: node
    region: oregon
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/main.js
    healthCheckPath: /api/activity
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false          # set in Render dashboard → paste Neon connection string
      - key: FRONTEND_URL
        sync: false          # your Vercel URL e.g. https://agent-rep.vercel.app
      - key: HEDERA_NETWORK
        value: testnet
      - key: HEDERA_ACCOUNT_ID
        sync: false          # 0.0.3700702
      - key: HEDERA_PRIVATE_KEY
        sync: false          # hex-encoded private key
      - key: STAKING_CONTRACT_ID
        value: 0.0.8264743
      - key: HCS_TOPIC_IDENTITY
        value: "0.0.8264956"
      - key: HCS_TOPIC_FEEDBACK
        value: "0.0.8264959"
      - key: HCS_TOPIC_VALIDATION
        value: "0.0.8264962"
