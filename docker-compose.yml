version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    container_name: agentrip-postgres
    environment:
      POSTGRES_DB: agentrip
      POSTGRES_USER: agentrip
      POSTGRES_PASSWORD: agentrip_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
